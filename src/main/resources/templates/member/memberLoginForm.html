<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">

<body layout:fragment="content">
<div class="mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-center text-2xl font-bold text-slate-900">로그인</h1>
    <p class="mt-2 text-center text-sm text-slate-500">모의투자 서비스를 계속 사용하려면 로그인하세요.</p>

    <form action="/member/login" th:action th:object="${memberLoginForm}" method="post" class="mt-6 space-y-4">
        <div th:if="${#fields.hasGlobalErrors()}" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-600">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
        </div>

        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700" for="email">Email</label>
            <input type="email" th:field="*{email}" id="email"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 transition focus:border-brand-500 focus:ring-1"/>
            <div class="mt-1 text-xs text-rose-600" th:errors="*{email}">email 오류</div>
        </div>

        <div>
            <label class="mb-1 block text-sm font-semibold text-slate-700" for="password">Password</label>
            <input type="password" th:field="*{password}" id="password"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 transition focus:border-brand-500 focus:ring-1"/>
            <div class="mt-1 text-xs text-rose-600" th:errors="*{password}">password 오류</div>
        </div>

        <button type="submit"
                class="w-full rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700">
            로그인
        </button>
        <button type="button" th:onclick="|location.href='@{/member/register}'|"
                class="w-full rounded-lg bg-slate-100 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-200">
            회원가입
        </button>
    </form>
</div>
</body>
</html>
