<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>보유자산</title>
</head>
<body layout:fragment="content">
<div class="space-y-6">
    <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="mb-4 text-center text-2xl font-bold text-slate-900">보유자산</h2>
        <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
            <div class="space-y-3">
                <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
                        <p class="text-xs text-slate-500">보유 KRW</p>
                        <p class="mt-1 text-2xl font-bold text-slate-800">
                            <span id="member_asset" th:text="${#numbers.formatInteger(memberAsset,1,'COMMA')}">-</span>
                            <span class="text-sm font-medium text-slate-500">KRW</span>
                        </p>
                    </div>
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
                        <p class="text-xs text-slate-500">총 보유자산</p>
                        <p class="mt-1 text-2xl font-bold text-slate-800">
                            <span id="total_member_asset">-</span>
                            <span class="text-sm font-medium text-slate-500">KRW</span>
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                    <div class="rounded-xl border border-slate-200 p-3">
                        <p class="text-xs text-slate-500">총매수금액</p>
                        <p class="mt-1 text-lg font-semibold text-slate-800">
                            <span id="total_buy_krw" th:text="${#numbers.formatInteger(totalBuyKrw,1,'COMMA')}">-</span>
                            <span class="text-sm font-medium text-slate-500">KRW</span>
                        </p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-3">
                        <p class="text-xs text-slate-500">총평가손익</p>
                        <p class="mt-1 text-lg font-semibold">
                            <span id="total_krw_of_return" class="fw-bold">-</span>
                            <span class="text-sm font-medium text-slate-500">KRW</span>
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                    <div class="rounded-xl border border-slate-200 p-3">
                        <p class="text-xs text-slate-500">총평가금액</p>
                        <p class="mt-1 text-lg font-semibold text-slate-800">
                            <span id="total_evaluation_krw">-</span>
                            <span class="text-sm font-medium text-slate-500">KRW</span>
                        </p>
                    </div>
                    <div class="rounded-xl border border-slate-200 p-3">
                        <p class="text-xs text-slate-500">총평가수익률</p>
                        <p class="mt-1 text-lg font-semibold">
                            <span id="total_evaluation_rate_of_return" class="fw-bold">-</span>
                            <span class="text-sm font-medium text-slate-500">%</span>
                        </p>
                    </div>
                </div>
            </div>
            <div id="hold_asset_chart" class="min-h-[320px]"></div>
        </div>
    </section>

    <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-slate-50 text-xs uppercase text-slate-500">
                <tr class="text-center">
                    <th class="px-3 py-3 text-left">보유자산</th>
                    <th class="px-3 py-3 text-right">보유수량</th>
                    <th class="px-3 py-3 text-right">매수평균가</th>
                    <th class="px-3 py-3 text-right">매수금액</th>
                    <th class="px-3 py-3 text-right">평가금액</th>
                    <th class="px-3 py-3 text-right">평가손익(%)</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="holdCrypto : ${holdCryptoList}" class="hover:bg-slate-50">
                    <td class="px-3 py-3">
                        <div class="flex items-center gap-3">
                            <img th:src="@{|https://static.upbit.com/logos/${holdCrypto.marketCodeOnlySymbol}.png|}" alt="" class="h-10 w-10 rounded-full border border-slate-200"/>
                            <div>
                                <p class="font-semibold text-slate-800" th:text="${holdCrypto.koreanName}">비트코인</p>
                                <p class="text-xs text-slate-500" th:text="${holdCrypto.marketCodeOnlySymbol}">BTC</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-3 py-3 text-right">
                        <span th:id="|${holdCrypto.marketCode}-hold-count|" th:text="${#numbers.formatDecimal(holdCrypto.holdCount,1,'COMMA',8,'POINT')}">0.03535</span>
                        <span class="ml-1 text-xs text-slate-500" th:text="${holdCrypto.marketCodeOnlySymbol}">BTC</span>
                    </td>
                    <td class="px-3 py-3 text-right">
                        <span th:id="|${holdCrypto.marketCode}-buy-average|" th:text="${#numbers.formatDecimal(holdCrypto.buyAverage,1,'COMMA',4,'POINT')}">21,943,430</span>
                        <span class="ml-1 text-xs text-slate-500">KRW</span>
                    </td>
                    <td class="px-3 py-3 text-right">
                        <span th:id="|${holdCrypto.marketCode}-buy-total-krw|" th:text="${#numbers.formatInteger(holdCrypto.buyTotalKrw,1,'COMMA')}">21,943,430</span>
                        <span class="ml-1 text-xs text-slate-500">KRW</span>
                    </td>
                    <td class="bg-slate-50 px-3 py-3 text-right">
                        <span class="font-semibold text-slate-800" th:id="|${holdCrypto.marketCode}-evaluation-krw|">21,943,430</span>
                        <span class="ml-1 text-xs text-slate-500">KRW</span>
                    </td>
                    <td class="px-3 py-3 text-right">
                        <p class="mb-1"><span class="font-semibold" th:id="|${holdCrypto.marketCode}-krw-of-return|">-</span><span class="ml-1 text-xs text-slate-500">KRW</span></p>
                        <p class="mb-0"><span class="font-semibold" th:id="|${holdCrypto.marketCode}-rate-of-return|">-</span><span class="ml-1 text-xs text-slate-500">%</span></p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>

<script th:inline="javascript">
    const marketArrayList = [[${marketArrayList}]];
    const holdCryptoList = [[${holdCryptoList}]];
</script>
<script th:src="@{/js/hold_crypto.js}" ></script>
</body>
</html>
