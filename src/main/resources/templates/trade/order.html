<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>거래소</title>
</head>
<body layout:fragment="content">
<div class="grid grid-cols-1 gap-5 xl:grid-cols-[minmax(0,1fr)_420px]">
    <section class="min-w-0 space-y-5">
        <div id="order_info" th:insert="~{trade/orderInfo :: orderInfoFragment}"></div>

        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <form th:action="@{/trade/order/buy}" th:object="${buyCryptoForm}" method="post" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <input type="hidden" id="buyMarketCode" name="buyMarketCode" value="KRW-BTC">
                <h3 class="text-lg font-bold text-slate-900"><span id="buy_symbol_name">BTC</span> 매수</h3>
                <div class="mt-4 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm">
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-slate-600">매수 가능</span>
                        <span th:if="${session.loginMember != null}" class="font-semibold text-slate-800">
                            <span id="holdAsset" th:text="|${#numbers.formatInteger(memberAsset, 1, 'COMMA')}|">0</span>
                            <span class="ml-1 text-slate-500">KRW</span>
                        </span>
                        <span th:if="${session.loginMember == null}" class="text-slate-500">로그인이 필요합니다.</span>
                    </div>
                    <span th:if="${session.loginMember == null}" id="holdAsset" class="hidden">0</span>
                </div>

                <div class="mt-4">
                    <label class="mb-1 block text-sm font-semibold text-slate-700" for="buyKrw">주문총액(KRW)</label>
                    <input type="text" id="buyKrw" th:field="*{buyKrw}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 transition focus:border-brand-500 focus:ring-1"/>
                    <div class="mt-1 text-xs text-rose-600" th:if="${#fields.hasErrors('buyKrw')}" th:errors="*{buyKrw}">숫자만 입력 오류</div>
                </div>

                <div class="mt-4 grid grid-cols-4 gap-2" id="buyQuantityBtnGroup">
                    <button type="button" class="rounded-lg border border-emerald-500 px-2 py-1.5 text-sm font-semibold text-emerald-600 transition hover:bg-emerald-50">10%</button>
                    <button type="button" class="rounded-lg border border-emerald-500 px-2 py-1.5 text-sm font-semibold text-emerald-600 transition hover:bg-emerald-50">25%</button>
                    <button type="button" class="rounded-lg border border-emerald-500 px-2 py-1.5 text-sm font-semibold text-emerald-600 transition hover:bg-emerald-50">50%</button>
                    <button type="button" class="rounded-lg border border-emerald-500 px-2 py-1.5 text-sm font-semibold text-emerald-600 transition hover:bg-emerald-50">100%</button>
                </div>

                <button th:if="${session.loginMember != null}" class="mt-4 w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-emerald-700" type="submit">매수</button>
                <button th:if="${session.loginMember == null}" class="mt-4 w-full rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-emerald-700" type="button" th:onclick="|location.href='@{/member/login}'|">로그인</button>
            </form>

            <form th:action="@{/trade/order/sell}" th:object="${sellCryptoForm}" method="post" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <input type="hidden" id="sellMarketCode" name="sellMarketCode" value="KRW-BTC">
                <h3 class="text-lg font-bold text-slate-900"><span id="sell_symbol_name">BTC</span> 매도</h3>
                <div class="mt-4 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm">
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-slate-600">매도 가능</span>
                        <span class="font-semibold text-slate-800"><span id="holdCryptoCount">-</span><span id="holdCryptoSymbol" class="ml-1 text-slate-500">-</span></span>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="mb-1 block text-sm font-semibold text-slate-700" for="sellCount">주문수량<span id="sellCryptoSymbol"></span></label>
                    <input type="text" id="sellCount" th:field="*{sellCount}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 transition focus:border-brand-500 focus:ring-1"/>
                    <div class="mt-1 text-xs text-rose-600" th:if="${#fields.hasErrors('sellCount')}" th:errors="*{sellCount}">숫자만 입력 오류</div>
                </div>

                <div class="mt-4 grid grid-cols-4 gap-2" id="sellQuantityBtnGroup">
                    <button type="button" class="rounded-lg border border-rose-500 px-2 py-1.5 text-sm font-semibold text-rose-600 transition hover:bg-rose-50">10%</button>
                    <button type="button" class="rounded-lg border border-rose-500 px-2 py-1.5 text-sm font-semibold text-rose-600 transition hover:bg-rose-50">25%</button>
                    <button type="button" class="rounded-lg border border-rose-500 px-2 py-1.5 text-sm font-semibold text-rose-600 transition hover:bg-rose-50">50%</button>
                    <button type="button" class="rounded-lg border border-rose-500 px-2 py-1.5 text-sm font-semibold text-rose-600 transition hover:bg-rose-50">100%</button>
                </div>

                <button th:if="${session.loginMember != null}" class="mt-4 w-full rounded-lg bg-rose-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-700" type="submit">매도</button>
                <button th:if="${session.loginMember == null}" class="mt-4 w-full rounded-lg bg-rose-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-700" type="button" th:onclick="|location.href='@{/member/login}'|">로그인</button>
            </form>
        </div>
    </section>

    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="border-b border-slate-200 px-4 py-3">
            <h3 class="text-sm font-bold text-slate-700">원화 마켓</h3>
        </div>
        <div class="max-h-[1320px] overflow-auto">
            <table class="min-w-full text-xs">
                <thead class="sticky top-0 z-10 bg-slate-50 text-slate-500">
                <tr>
                    <th class="px-3 py-2 text-left">한글명</th>
                    <th class="px-3 py-2 text-right">현재가</th>
                    <th class="px-3 py-2 text-right">전일대비</th>
                    <th class="px-3 py-2 text-right">거래대금</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <th:block th:each="item : ${upbitMarketList}">
                    <tr th:onclick="getCryptoChartAndData([[${item.market}]])" class="cursor-pointer hover:bg-slate-50">
                        <td class="px-3 py-2 font-semibold text-slate-700" th:text="${item.koreanName}">-</td>
                        <td class="px-3 py-2 font-semibold text-right" th:id="${item.market} + '-trade_price'">-</td>
                        <td class="px-3 py-2 text-right" th:id="${item.market} + '-signed_change_rate'">-</td>
                        <td class="px-3 py-2 text-right text-slate-600" th:id="${item.market} + '-acc_trade_price_24h'">-</td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </section>
</div>

<script th:inline="javascript">const marketCodeListForWebsocket = [[${marketListString}]];</script>
<script th:src="@{/js/order.js}"></script>
</body>

</html>
